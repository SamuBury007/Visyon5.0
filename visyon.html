<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VixSrc Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container {
    width: 100%;
    max-width: 620px;
  }
  .logo {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .logo h1 span { color: #7c6cfc; }
  .logo p {
    font-size: 13px;
    color: #666;
    margin-top: 6px;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 2rem;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #888;
    margin-bottom: 10px;
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #7c6cfc; }
  input[type="text"]::placeholder { color: #444; }
  button {
    background: #7c6cfc;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  button:hover { background: #6a5ae0; }
  button:active { transform: scale(0.97); }
  button:disabled { background: #333; color: #555; cursor: not-allowed; }

  .status {
    margin-top: 1.5rem;
    display: none;
  }
  .status-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #888;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid #333;
    border-top-color: #7c6cfc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-box {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 1.5rem;
    display: none;
  }
  .result-box.success { border-color: #1e4a2e; }
  .result-box.error { border-color: #4a1e1e; }
  .result-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .result-box.success .result-label { color: #4ade80; }
  .result-box.error .result-label { color: #f87171; }
  .result-url {
    font-size: 12px;
    color: #aaa;
    word-break: break-all;
    line-height: 1.6;
    font-family: monospace;
  }
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn-small {
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-small:hover { background: #333; }
  .btn-small.accent { background: #1e1a3a; color: #a89ffc; border-color: #3d3470; }
  .btn-small.accent:hover { background: #2a2450; }

  .tip {
    margin-top: 1.5rem;
    font-size: 12px;
    color: #444;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>Vix<span>Src</span> Extractor</h1>
    <p>Estrai il link M3U8 da vixsrc.to</p>
  </div>

  <div class="card">
    <label for="urlInput">URL del video</label>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://vixsrc.to/movie/..." />
      <button id="extractBtn" onclick="extract()">Estrai</button>
    </div>

    <div class="status" id="status">
      <div class="status-loading">
        <div class="spinner"></div>
        <span id="statusText">Avvio browser headless...</span>
      </div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-label" id="resultLabel"></div>
      <div class="result-url" id="resultUrl"></div>
      <div class="actions" id="resultActions"></div>
    </div>
  </div>

  <p class="tip">Il server impiega 30–60 secondi per analizzare la pagina con Playwright.</p>
</div>

<script>
const SERVER = 'https://visyon50-production.up.railway.app';

let statusInterval = null;
const statusMessages = [
  'Avvio browser headless...',
  'Caricamento pagina...',
  'Intercettazione richieste di rete...',
  'Analisi playlist HLS...',
  'Verifica traccia audio...',
  'Quasi pronto...',
];
let statusIdx = 0;

async function extract() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) {
    shake(document.getElementById('urlInput'));
    return;
  }

  const btn = document.getElementById('extractBtn');
  const status = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');

  btn.disabled = true;
  status.style.display = 'block';
  resultBox.style.display = 'none';
  statusIdx = 0;
  document.getElementById('statusText').textContent = statusMessages[0];

  statusInterval = setInterval(() => {
    statusIdx = (statusIdx + 1) % statusMessages.length;
    document.getElementById('statusText').textContent = statusMessages[statusIdx];
  }, 6000);

  try {
    const res = await fetch(SERVER + '/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    showResult(data);
  } catch (e) {
    showResult({ success: false, error: 'Impossibile contattare il server: ' + e.message });
  } finally {
    clearInterval(statusInterval);
    btn.disabled = false;
    status.style.display = 'none';
  }
}

function proxyUrl(originalUrl) {
  // Indirizza la playlist attraverso il proxy Flask per aggiungere Referer/Origin corretti
  return SERVER + '/proxy?url=' + encodeURIComponent(originalUrl);
}

function showResult(data) {
  const box = document.getElementById('resultBox');
  const label = document.getElementById('resultLabel');
  const urlEl = document.getElementById('resultUrl');
  const actions = document.getElementById('resultActions');

  box.style.display = 'block';
  actions.innerHTML = '';

  if (data.success) {
    box.className = 'result-box success';
    label.textContent = '✓ Playlist trovata';
    urlEl.textContent = data.url;

    // URL originale (per VLC e copia)
    const rawUrl   = data.url;
    // URL proxied (per riproduzione nel browser)
    const proxied  = proxyUrl(rawUrl);

    // --- Bottoni azione ---
    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn-small accent';
    copyBtn.textContent = 'Copia link';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(rawUrl);
      copyBtn.textContent = 'Copiato!';
      setTimeout(() => copyBtn.textContent = 'Copia link', 2000);
    };

    const openBtn = document.createElement('button');
    openBtn.className = 'btn-small';
    openBtn.textContent = 'Apri in VLC';
    openBtn.onclick = () => window.open('vlc://' + rawUrl);

    const playBtn = document.createElement('button');
    playBtn.className = 'btn-small accent';
    playBtn.textContent = '▶ Riproduci qui';
    playBtn.onclick = () => openPlayer(proxied);

    actions.appendChild(playBtn);
    actions.appendChild(copyBtn);
    actions.appendChild(openBtn);
  } else {
    box.className = 'result-box error';
    label.textContent = '✗ Errore';
    urlEl.textContent = data.error || 'Nessun link trovato.';
  }
}

// ── Player inline con HLS.js ──────────────────────────────────────────
function openPlayer(proxiedUrl) {
  // Rimuovi eventuale player precedente
  const old = document.getElementById('hlsPlayerWrap');
  if (old) old.remove();

  const wrap = document.createElement('div');
  wrap.id = 'hlsPlayerWrap';
  wrap.style.cssText = 'margin-top:1.5rem;border-radius:12px;overflow:hidden;background:#000;position:relative;';

  const video = document.createElement('video');
  video.id = 'hlsVideo';
  video.controls = true;
  video.autoplay = true;
  video.style.cssText = 'width:100%;display:block;max-height:360px;';

  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px;z-index:10;';
  closeBtn.onclick = () => { wrap.remove(); };

  wrap.appendChild(video);
  wrap.appendChild(closeBtn);
  document.querySelector('.container').appendChild(wrap);

  // Carica HLS.js da CDN se non già presente
  function initHls() {
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(proxiedUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) console.error('HLS fatal error:', data);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari nativo
      video.src = proxiedUrl;
    } else {
      alert('Il tuo browser non supporta HLS.');
    }
  }

  if (window.Hls) {
    initHls();
  } else {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js';
    script.onload = initHls;
    document.head.appendChild(script);
  }
}

function shake(el) {
  el.style.borderColor = '#f87171';
  setTimeout(() => { el.style.borderColor = ''; }, 1500);
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') extract();
});
</script>
</body>
</html>
